# Paste under `services:` in your existing ~/home-assistant/compose.yaml
# (sitting next to the homeassistant service itself).
#
# Build context assumes the repo is cloned at ~/home-assistant/amber-battery-optimiser.
# If you put it elsewhere, adjust `build:` accordingly.

  amber_battery_optimiser:
    build: ./amber-battery-optimiser
    container_name: amber_battery_optimiser
    restart: unless-stopped
    env_file:
      - ./amber-battery-optimiser/.env
    depends_on:
      - homeassistant          # rename if your HA service is different
    # Shares the HA network so HA_URL=http://homeassistant:8123 resolves.
    # If your HA container is on a custom network, set it here too.
    # networks: [default]

  amber_optimiser_refresh:
    # Tiny webhook: HA POSTs to it → it git-pulls and rebuilds + recreates the
    # optimiser container via `docker compose up -d --build`.
    # Internal docker network only — no host port, no auth.
    build: ./amber-battery-optimiser/refresh
    container_name: amber_optimiser_refresh
    restart: unless-stopped
    environment:
      - REPO_DIR=/repo
      - TARGET_CONTAINER=amber_battery_optimiser
      - TARGET_SERVICE=amber_battery_optimiser
      # Path inside the container — must equal the host path (see volume mount).
      - COMPOSE_FILE=/home/scott/home-assistant/compose.yaml
    volumes:
      # Mount the optimiser repo so the service can `git pull` it.
      - ./amber-battery-optimiser:/repo
      # Mount the entire home-assistant dir at the SAME path inside the container.
      # The docker daemon runs on the host, so when compose tells it to build
      # `./amber-battery-optimiser`, the daemon needs that path to exist on the
      # host — which it does, because the in-container path matches.
      - /home/scott/home-assistant:/home/scott/home-assistant
      # Read/write to the docker socket so it can drive the daemon.
      - /var/run/docker.sock:/var/run/docker.sock
