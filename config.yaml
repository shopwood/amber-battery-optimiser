name: Amber Battery Optimiser
version: "0.1.0"
slug: amber_battery_optimiser
description: Daily tuning of buy/sell threshold helpers from Amber prices, Solcast forecast and battery SoC.
arch:
  - amd64
  - aarch64
startup: services
boot: auto
init: false
hassio_api: true
hassio_role: default
homeassistant_api: true
map:
  - share:rw
options:
  amber_token: ""
  amber_site_id: "01K1Z85JVTMQNFB3H5CS6YD95Y"
  run_at: "05:00"            # local time, daily
  dry_run: false
  # Entities
  soc_entity: sensor.esy_sunhome_1926470123495710721_battery_state_of_charge
  general_price_entity: sensor.01k1z85jvtmqnfb3h5cs6yd95y_general_price
  feed_in_price_entity: sensor.01k1z85jvtmqnfb3h5cs6yd95y_feed_in_price
  solcast_forecast_entity: sensor.solcast_pv_forecast_forecast_today
  # Physical battery
  battery_capacity_kwh: 10.0
  battery_soc_floor_pct: 10.0
  battery_soc_ceiling_pct: 100.0
  # Load estimate
  daily_load_kwh: 20.0        # rough avg; refine later from your HA energy dashboard
  # Percentile bands for thresholds (0-100)
  sell_high_pct: 90
  sell_low_pct: 70
  buy_low_pct: 10
  buy_mid_pct: 30
schema:
  amber_token: str
  amber_site_id: str
  run_at: str
  dry_run: bool
  soc_entity: str
  general_price_entity: str
  feed_in_price_entity: str
  solcast_forecast_entity: str
  battery_capacity_kwh: float
  battery_soc_floor_pct: float
  battery_soc_ceiling_pct: float
  daily_load_kwh: float
  sell_high_pct: int(0,100)
  sell_low_pct: int(0,100)
  buy_low_pct: int(0,100)
  buy_mid_pct: int(0,100)
